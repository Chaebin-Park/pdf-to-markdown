name: Release

on:
  push:
    tags:
      - 'v*'

env:
  UV_VERSION: "0.11.14"

jobs:
  # ── 1. Ktor server JAR 빌드 ────────────────────────────────────
  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Gradle 의존성 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper/dists
          key: gradle-${{ hashFiles('server/**/*.gradle*', 'server/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: server.jar 캐시
        id: jar-cache
        uses: actions/cache@v4
        with:
          path: server/app/build/libs/server.jar
          key: server-jar-${{ hashFiles('server/app/src/**', 'server/**/*.gradle*', 'server/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Build server.jar
        if: steps.jar-cache.outputs.cache-hit != 'true'
        working-directory: server
        run: ./gradlew shadowJar

      - uses: actions/upload-artifact@v4
        with:
          name: server-jar
          path: server/app/build/libs/server.jar

  # ── 2. macOS (Apple Silicon) 빌드 ─────────────────────────────
  build-macos:
    needs: build-server
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: server-jar
          path: server/app/build/libs/

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust 빌드 캐시
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - uses: cargo-bins/cargo-binstall@main

      - name: Install tauri-cli
        run: cargo binstall --no-confirm tauri-cli@^2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Download uv (macOS arm64)
        run: |
          curl -L "https://github.com/astral-sh/uv/releases/download/${{ env.UV_VERSION }}/uv-aarch64-apple-darwin.tar.gz" -o uv.tar.gz
          tar xzf uv.tar.gz
          UV_BIN=$(find . -name "uv" -not -name "uvx" -type f | head -1)
          cp "$UV_BIN" src-tauri/resources/uv-macos-arm64
          chmod +x src-tauri/resources/uv-macos-arm64

      - name: Build (macOS)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: cargo tauri build --target aarch64-apple-darwin

      - name: Create .app.tar.gz + sign
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          cd src-tauri/target/aarch64-apple-darwin/release/bundle/macos
          tar -czf pdf-to-markdown.app.tar.gz pdf-to-markdown.app
          cd ${{ github.workspace }}
          TAURI_SIGNING_PRIVATE_KEY="${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" \
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD="" \
          cargo tauri signer sign \
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/pdf-to-markdown.app.tar.gz

      - name: Stage macOS artifacts
        run: |
          mkdir -p staging
          cp src-tauri/target/aarch64-apple-darwin/release/bundle/macos/pdf-to-markdown.app.tar.gz staging/
          cp src-tauri/target/aarch64-apple-darwin/release/bundle/macos/pdf-to-markdown.app.tar.gz.sig staging/
          cp src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg staging/

      - uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: staging/

  # ── 3. Windows (x64) 빌드 ─────────────────────────────────────
  build-windows:
    needs: build-server
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: server-jar
          path: server/app/build/libs/

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust 빌드 캐시
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - uses: cargo-bins/cargo-binstall@main

      - name: Install tauri-cli
        run: cargo binstall --no-confirm tauri-cli@^2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Download uv (Windows x64)
        shell: bash
        run: |
          curl -L "https://github.com/astral-sh/uv/releases/download/${{ env.UV_VERSION }}/uv-x86_64-pc-windows-msvc.zip" -o uv.zip
          unzip -o uv.zip
          UV_BIN=$(find . -name "uv.exe" | head -1)
          cp "$UV_BIN" src-tauri/resources/uv-windows-x86_64.exe

      - name: Create minimal JRE with jlink (Windows)
        shell: bash
        run: |
          # GitHub Actions Windows 러너에는 Java 21이 사전 설치되어 있음
          JAVA_HOME_PATH="${JAVA_HOME_21_X64:-$JAVA_HOME}"
          echo "JDK 경로: $JAVA_HOME_PATH"

          # server.jar 의존 모듈 자동 분석
          DETECTED=$("$JAVA_HOME_PATH/bin/jdeps" \
            --ignore-missing-deps \
            --print-module-deps \
            --multi-release 21 \
            server/app/build/libs/server.jar 2>/dev/null || echo "")

          # Ktor 서버 필수 모듈 (jdeps가 놓치는 런타임 의존성 포함)
          ESSENTIAL="java.base,java.logging,java.management,java.management.rmi,java.rmi,java.naming,java.net.http,java.security.jgss,java.xml,jdk.crypto.ec,jdk.management,jdk.zipfs,java.instrument"

          # 합치고 중복 제거
          ALL=$(echo "$DETECTED,$ESSENTIAL" | tr ',' '\n' | grep -v '^$' | sort -u | tr '\n' ',' | sed 's/,$//')
          echo "포함 모듈: $ALL"

          rm -rf src-tauri/resources/jre src-tauri/resources/jre.zip
          "$JAVA_HOME_PATH/bin/jlink" \
            --add-modules "$ALL" \
            --strip-debug \
            --no-header-files \
            --no-man-pages \
            --compress=2 \
            --output src-tauri/resources/jre

          echo "JRE 크기: $(du -sh src-tauri/resources/jre | cut -f1)"

          # 단일 파일로 번들하기 위해 zip 압축 후 디렉토리 삭제
          powershell -Command "Compress-Archive -Path 'src-tauri\\resources\\jre' -DestinationPath 'src-tauri\\resources\\jre.zip' -Force"
          rm -rf src-tauri/resources/jre
          echo "jre.zip 크기: $(du -sh src-tauri/resources/jre.zip | cut -f1)"

      - name: Build (Windows)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: cargo tauri build --target x86_64-pc-windows-msvc --config src-tauri/tauri.windows.conf.json

      - name: Sign Windows installers
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          BUNDLE_DIR="src-tauri/target/x86_64-pc-windows-msvc/release/bundle"
          for f in $(find "$BUNDLE_DIR" \( -name "*.msi" -o -name "*.exe" \) ! -name "*.sig"); do
            echo "Signing: $f"
            TAURI_SIGNING_PRIVATE_KEY="${TAURI_SIGNING_PRIVATE_KEY}" \
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD="" \
            cargo tauri signer sign "$f"
          done

      - name: Stage Windows artifacts
        shell: bash
        run: |
          mkdir -p staging
          BUNDLE_DIR="src-tauri/target/x86_64-pc-windows-msvc/release/bundle"
          find "$BUNDLE_DIR" -name "*.msi" -exec cp {} staging/ \; || true
          find "$BUNDLE_DIR" -name "*.msi.sig" -exec cp {} staging/ \; || true
          find "$BUNDLE_DIR" -name "*.exe" ! -name "*.sig" -exec cp {} staging/ \; || true
          find "$BUNDLE_DIR" -name "*.exe.sig" -exec cp {} staging/ \; || true

      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: staging/

  # ── 4. GitHub Release 생성 + latest.json ──────────────────────
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: macos-artifacts
          path: artifacts/macos

      - uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: artifacts/windows

      - name: List artifacts (debug)
        run: find artifacts/ -type f | sort

      - name: Generate latest.json
        run: |
          python3 - <<'PYEOF'
          import json, glob, os, subprocess
          from datetime import datetime, timezone

          version = "${{ github.ref_name }}".lstrip("v")
          repo = "${{ github.repository }}"
          tag = "${{ github.ref_name }}"
          base_url = f"https://github.com/{repo}/releases/download/{tag}"
          pub_date = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

          # macOS sig
          macos_sig = open("artifacts/macos/pdf-to-markdown.app.tar.gz.sig").read().strip()

          # Windows sig (msi.sig or exe.sig)
          win_sig_files = glob.glob("artifacts/windows/*.msi.sig") + glob.glob("artifacts/windows/*.exe.sig")
          if not win_sig_files:
              print("ERROR: No Windows .sig file found")
              for f in sorted(os.listdir("artifacts/windows")):
                  print(" ", f)
              exit(1)
          win_sig = open(win_sig_files[0]).read().strip()

          # Windows installer
          win_installers = [f for f in glob.glob("artifacts/windows/*.msi") + glob.glob("artifacts/windows/*.exe") if not f.endswith(".sig")]
          if not win_installers:
              print("ERROR: No Windows installer found")
              exit(1)
          win_filename = os.path.basename(win_installers[0])

          data = {
              "version": version,
              "notes": f"See https://github.com/{repo}/releases/tag/{tag}",
              "pub_date": pub_date,
              "platforms": {
                  "darwin-aarch64": {
                      "signature": macos_sig,
                      "url": f"{base_url}/pdf-to-markdown.app.tar.gz"
                  },
                  "windows-x86_64": {
                      "signature": win_sig,
                      "url": f"{base_url}/{win_filename}"
                  }
              }
          }
          with open("latest.json", "w") as f:
              json.dump(data, f, indent=2)
          print(open("latest.json").read())
          PYEOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macos/*.tar.gz
            artifacts/macos/*.tar.gz.sig
            artifacts/macos/*.dmg
            artifacts/windows/*.msi
            artifacts/windows/*.msi.sig
            artifacts/windows/*.exe
            artifacts/windows/*.exe.sig
            latest.json
          generate_release_notes: false
          body: |
            ## Installation

            **macOS (Apple Silicon)**: Download `.dmg`, open and drag to Applications.
            If Gatekeeper blocks the app: System Settings → Privacy & Security → Open Anyway
            or run `xattr -cr /Applications/pdf-to-markdown.app` in Terminal.

            **Windows**: Download `.msi` and run the installer.
