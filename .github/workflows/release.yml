name: Release

on:
  push:
    tags:
      - 'v*'

env:
  UV_VERSION: "0.11.14"

jobs:
  # ── 1. Ktor server JAR 빌드 (플랫폼 무관) ──────────────────────
  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build server.jar
        working-directory: server
        run: ./gradlew shadowJar

      - uses: actions/upload-artifact@v4
        with:
          name: server-jar
          path: server/app/build/libs/server.jar

  # ── 2. macOS (Apple Silicon) 빌드 ─────────────────────────────
  build-macos:
    needs: build-server
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: server-jar
          path: server/app/build/libs/

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Download uv (macOS arm64)
        run: |
          curl -L "https://github.com/astral-sh/uv/releases/download/${{ env.UV_VERSION }}/uv-aarch64-apple-darwin.tar.gz" -o uv.tar.gz
          tar xzf uv.tar.gz
          UV_BIN=$(find . -name "uv" -not -name "uvx" -type f | head -1)
          cp "$UV_BIN" src-tauri/resources/uv-macos-arm64
          chmod +x src-tauri/resources/uv-macos-arm64

      - name: Build (macOS)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: cargo tauri build --target aarch64-apple-darwin
        working-directory: .

      - name: Create .app.tar.gz + sign
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          cd src-tauri/target/aarch64-apple-darwin/release/bundle/macos
          tar -czf pdf-to-markdown.app.tar.gz pdf-to-markdown.app
          cd ${{ github.workspace }}
          TAURI_SIGNING_PRIVATE_KEY="${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" \
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD="" \
          cargo tauri signer sign \
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/pdf-to-markdown.app.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/pdf-to-markdown.app.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/pdf-to-markdown.app.tar.gz.sig
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

  # ── 3. Windows (x64) 빌드 ─────────────────────────────────────
  build-windows:
    needs: build-server
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: server-jar
          path: server/app/build/libs/

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Download uv (Windows x64)
        shell: bash
        run: |
          curl -L "https://github.com/astral-sh/uv/releases/download/${{ env.UV_VERSION }}/uv-x86_64-pc-windows-msvc.zip" -o uv.zip
          unzip -o uv.zip
          UV_BIN=$(find . -name "uv.exe" | head -1)
          cp "$UV_BIN" src-tauri/resources/uv-windows-x86_64.exe

      - name: Build (Windows)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          cargo tauri build --target x86_64-pc-windows-msvc `
            --config src-tauri/tauri.windows.conf.json

      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi.sig
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe.sig

  # ── 4. GitHub Release 생성 + latest.json 업로드 ───────────────
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: macos-artifacts
          path: artifacts/macos

      - uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: artifacts/windows

      - name: Generate latest.json
        run: |
          MACOS_SIG=$(cat artifacts/macos/pdf-to-markdown.app.tar.gz.sig)
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          # Windows sig (.msi.sig 또는 .exe.sig 중 먼저 존재하는 것)
          WIN_SIG_FILE=$(find artifacts/windows -name "*.sig" | head -1)
          WIN_SIG=$(cat "$WIN_SIG_FILE")
          WIN_INSTALLER=$(find artifacts/windows -name "*.msi" -o -name "*.exe" | grep -v sig | head -1)
          WIN_FILENAME=$(basename "$WIN_INSTALLER")

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "See https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MACOS_SIG}",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/pdf-to-markdown.app.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${WIN_FILENAME}"
              }
            }
          }
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macos/pdf-to-markdown.app.tar.gz
            artifacts/macos/pdf-to-markdown.app.tar.gz.sig
            artifacts/macos/*.dmg
            artifacts/windows/*.msi
            artifacts/windows/*.msi.sig
            artifacts/windows/*.exe
            artifacts/windows/*.exe.sig
            latest.json
          generate_release_notes: false
          body: |
            ## Installation

            **macOS (Apple Silicon)**: Download `.dmg`, open and drag to Applications.
            If Gatekeeper blocks the app: System Settings → Privacy & Security → Open Anyway
            or run `xattr -cr /Applications/pdf-to-markdown.app` in Terminal.

            **Windows**: Download `.msi` and run the installer.
